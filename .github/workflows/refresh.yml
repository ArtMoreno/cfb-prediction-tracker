name: Refresh prediction data

on:
  schedule:
    # Every 3 hours (GitHub Actions free tier: 2000 min/month; this ~480 min/mo).
    - cron: "7 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build data.json
        run: python build_data.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "chore: refresh 247 prediction data"
            git push
          fi
